name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require changeset (or empty changeset) for PRs
        if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
        run: npx changeset status --since=origin/${{ github.event.pull_request.base.ref }}

      - name: Typecheck
        run: npm run check-types

      - name: Unit tests
        run: npm run test:unit

      - name: Compile
        run: npm run compile

  release:
    name: Release (changesets)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Changesets (version PR, GitHub Release, or version publish)
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          publish: npm run changeset:publish
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-marketplace:
    name: Publish — Visual Studio Marketplace
    needs: [build, release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: git pull --ff-only origin main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish to Visual Studio Marketplace
        run: npm run release:marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  release-openvsx:
    name: Publish — Open VSX
    needs: [build, release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main
        run: git pull --ff-only origin main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish to Open VSX Registry
        run: npm run release:openvsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
