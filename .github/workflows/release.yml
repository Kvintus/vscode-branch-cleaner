name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Changesets (version PR, GitHub Release, or Marketplace publish)
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          publish: npm run release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Personal access token for https://marketplace.visualstudio.com (used by vsce publish).
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
